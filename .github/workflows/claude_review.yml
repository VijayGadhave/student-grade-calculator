name: Claude Code PR Review

on:
  pull_request:
    branches: [ main ]       # triggers on PRs to main only
    types: [ opened, synchronize, reopened ]

jobs:
  claude-review:
    runs-on: ubuntu-latest   # fresh Linux VM for every run
    permissions:
      contents: read         # read repo files
      pull-requests: write   # post review comments on the PR
      id-token: write        # required by the Claude Code action

    steps:
      - uses: actions/checkout@v4      # download the code
      - uses: actions/setup-python@v5  # install Python 3.11
      - run: pip install pytest
      - run: PYTHONPATH=. pytest tests/ -v --tb=short
        # PYTHONPATH=. is critical — without it pytest cannot find grades.py

      - uses: anthropics/claude-code-action@v1
        # @v1 is the stable release — never use @beta (deprecated)
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read CLAUDE.md and review changed Python files.
            Flag: missing type hints, docstrings, tests, long functions.
            Post review as a comment on this PR.
